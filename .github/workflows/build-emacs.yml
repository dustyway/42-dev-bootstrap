name: Build Emacs

# Builds a GTK3/X11 Emacs with tree-sitter + native-compilation from a signed
# GNU source tarball and publishes it as a GitHub Release asset. emacs-bootstrap
# pulls from these releases after an sgoinfre wipe.
#
# X11, not pgtk: 42 cluster sessions run X.Org. Emacs built with --with-pgtk
# prints a "pure-GTK under X is unsupported" warning and crashes on large
# clipboard transfers. The default GTK3 toolkit builds against X11 cleanly.
#
# Trigger by pushing a tag named emacs-<VERSION>, e.g.:
#   git tag emacs-30.2 && git push origin emacs-30.2
# Or run manually via the Actions UI (workflow_dispatch).
#
# Runner is pinned to ubuntu-22.04 so the glibc floor (2.35) matches the 42
# cluster baseline; newer Ubuntu hosts are forward-compatible.

on:
  push:
    tags:
      - "emacs-*"
  workflow_dispatch:
    inputs:
      emacs_version:
        description: "Emacs version to build (e.g. 30.2)"
        required: true
        default: "30.2"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      # Opt into Node 24 for JS actions now — Node 20 is deprecated and will
      # be forced off starting 2026-06-02. checkout@v4 and
      # action-gh-release@v2 both support Node 24 already.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ inputs.emacs_version }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
            v="${tag#emacs-}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=emacs-$v" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential texinfo pkg-config \
            libgtk-3-dev \
            libgnutls28-dev \
            libncurses-dev \
            libgccjit-11-dev gcc-11 \
            libwebp-dev libjpeg-dev libpng-dev libtiff-dev libgif-dev \
            libxml2-dev libsqlite3-dev \
            libxpm-dev libacl1-dev \
            gpg gpgv

      - name: Build libtree-sitter from source
        # Ubuntu 22.04's libtree-sitter-dev is 0.20.x, which caps Emacs at
        # language ABI 14. Parsers built with modern tree-sitter CLIs export
        # ABI 15 and fail to load. Build from a pinned upstream tag and point
        # both Emacs's configure and the final bundle at this install.
        #
        # Pin to the 0.25.x line: ABI 15 landed in 0.25.0, and 0.25.x still
        # exports the legacy `ts_language_version` symbol Emacs 30.2 calls.
        # 0.26.0 removed it, so linking Emacs against 0.26.x fails with
        # "undefined reference to ts_language_version".
        env:
          TS_VERSION: "0.25.10"
        run: |
          curl -fsSL --retry 5 --retry-delay 10 --retry-max-time 300 \
            -o tree-sitter.tar.gz \
            "https://github.com/tree-sitter/tree-sitter/archive/refs/tags/v${TS_VERSION}.tar.gz"
          tar -xf tree-sitter.tar.gz
          make -C "tree-sitter-${TS_VERSION}" PREFIX=/opt/tree-sitter -j"$(nproc)"
          sudo make -C "tree-sitter-${TS_VERSION}" PREFIX=/opt/tree-sitter install
          # Make the fresh install visible to Emacs's configure (pkg-config
          # probe) and to the linker at build time.
          echo "PKG_CONFIG_PATH=/opt/tree-sitter/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/opt/tree-sitter/lib" >> "$GITHUB_ENV"

      - name: Download and verify Emacs source
        run: |
          v="${{ steps.ver.outputs.version }}"
          # ftpmirror.gnu.org load-balances across volunteer mirrors; individual
          # mirrors 502 or stall often enough that zero retries is unsafe. curl's
          # --retry already covers 5xx and connection errors; bump to 5 attempts.
          # When the whole mirror pool is down (seen 6x 502 in one run), fall
          # back to ftp.gnu.org — canonical, single-source, slower but reliable.
          dl_try() {
            local dest=$1; shift
            for url in "$@"; do
              if curl -fsSL --retry 5 --retry-delay 10 --retry-max-time 300 -o "$dest" "$url"; then
                return 0
              fi
              echo "download failed: $url — trying next source" >&2
            done
            return 1
          }
          dl_try "emacs-${v}.tar.xz" \
            "https://ftpmirror.gnu.org/emacs/emacs-${v}.tar.xz" \
            "https://ftp.gnu.org/gnu/emacs/emacs-${v}.tar.xz"
          dl_try "emacs-${v}.tar.xz.sig" \
            "https://ftpmirror.gnu.org/emacs/emacs-${v}.tar.xz.sig" \
            "https://ftp.gnu.org/gnu/emacs/emacs-${v}.tar.xz.sig"
          dl_try gnu-keyring.gpg "https://ftp.gnu.org/gnu/gnu-keyring.gpg"
          gpgv --keyring ./gnu-keyring.gpg "emacs-${v}.tar.xz.sig" "emacs-${v}.tar.xz"
          tar -xf "emacs-${v}.tar.xz"

      - name: Configure
        working-directory: emacs-${{ steps.ver.outputs.version }}
        env:
          CC: gcc-11
        run: |
          ./configure \
            --prefix=/opt/emacs \
            --with-native-compilation=aot \
            --with-tree-sitter \
            --with-x-toolkit=gtk3 \
            --with-modules \
            --with-xml2 \
            --with-gnutls \
            --without-imagemagick \
            --without-xwidgets \
            --without-dbus \
            --without-compress-install \
            CFLAGS="-O2 -pipe"

      - name: Build
        working-directory: emacs-${{ steps.ver.outputs.version }}
        run: make -j"$(nproc)"

      - name: Install to staging
        working-directory: emacs-${{ steps.ver.outputs.version }}
        run: |
          make install DESTDIR="$GITHUB_WORKSPACE/staging"
          # Do NOT strip bin/emacs-<VER>: Emacs 30's pdumper looks for a
          # content-addressed emacs-<sha256>.pdmp file keyed off the binary
          # fingerprint, so any post-build mutation (including strip) breaks
          # dump loading and forces a full bootstrap on every startup.
          # The savings from stripping are marginal vs the pdump/lisp tree.
          # Replace bin/emacs (a symlink to emacs-<VER>) with a relocation
          # wrapper so the tarball can be extracted anywhere, not just at
          # /opt/emacs where --prefix pointed.
          v="${{ steps.ver.outputs.version }}"
          arch="x86_64-pc-linux-gnu"
          emacs_bin="$GITHUB_WORKSPACE/staging/opt/emacs/bin/emacs"
          rm -f "$emacs_bin"
          sed -e "s|__EMACS_VERSION__|$v|g" -e "s|__EMACS_ARCH__|$arch|g" \
              "$GITHUB_WORKSPACE/.github/emacs-wrapper.sh" > "$emacs_bin"
          chmod +x "$emacs_bin"
          # Bundle runtime libs that live in Ubuntu universe (not guaranteed
          # on a no-sudo 42 cluster). The wrapper adds lib/ to LD_LIBRARY_PATH.
          libdir="$GITHUB_WORKSPACE/staging/opt/emacs/lib"
          mkdir -p "$libdir"
          # libtree-sitter: bundle the version we just built from source, not
          # whatever ldconfig points at (the apt package would be 0.20.x and
          # cap ABI at 14). Query the exact SONAME the emacs binary links
          # against — tree-sitter 0.25.x uses libtree-sitter.so.0.25 (with
          # minor version), not the conventional libtree-sitter.so.0, so
          # hardcoding the filename would ship a useless bundle.
          v="${{ steps.ver.outputs.version }}"
          ts_soname=$(objdump -p "$GITHUB_WORKSPACE/staging/opt/emacs/bin/emacs-${v}" \
            | awk '/NEEDED/ && /libtree-sitter/ { print $2 }')
          if [[ -z "$ts_soname" ]]; then
            echo "missing: NEEDED entry for libtree-sitter in emacs-${v}" >&2
            exit 1
          fi
          cp -L "/opt/tree-sitter/lib/$ts_soname" "$libdir/$ts_soname"
          echo "bundled: $ts_soname <- /opt/tree-sitter/lib"
          for soname in libgccjit.so.0; do
            src=$(ldconfig -p | awk -v s="$soname" '$1 == s { print $NF; exit }')
            if [[ -n "$src" ]]; then
              cp -L "$src" "$libdir/$soname"
              echo "bundled: $soname <- $src"
            else
              echo "missing: $soname (not found via ldconfig)" >&2
              exit 1
            fi
          done

      - name: Package tarball
        run: |
          v="${{ steps.ver.outputs.version }}"
          out="emacs-${v}-linux-x86_64.tar.gz"
          # Rename the install dir rather than using `tar --transform`, whose
          # regex also rewrites symlink targets — e.g. bin/emacs -> emacs-30.2
          # would become emacs-30.2-30.2 and dangle.
          mv "staging/opt/emacs" "staging/opt/emacs-${v}"
          tar -C staging/opt -czf "$out" "emacs-${v}"
          sha256sum "$out" > "${out}.sha256"
          ls -lh "$out" "${out}.sha256"

      - name: Smoke-test the tarball
        run: |
          v="${{ steps.ver.outputs.version }}"
          mkdir -p check
          tar -xzf "emacs-${v}-linux-x86_64.tar.gz" -C check --strip-components=1
          # Scrub LD_LIBRARY_PATH so the bundle is tested as a 42-cluster user
          # would see it: only the paths the wrapper sets count. Earlier build
          # steps set LD_LIBRARY_PATH=/opt/tree-sitter/lib via $GITHUB_ENV, and
          # that would silently mask a missing SONAME in lib/ otherwise.
          unset LD_LIBRARY_PATH
          check/bin/emacs --version
          check/bin/emacs --batch --eval "(unless (treesit-available-p) (error \"tree-sitter missing\"))"
          check/bin/emacs --batch --eval "(let ((v (treesit-library-abi-version))) (unless (>= v 15) (error \"tree-sitter ABI %d < 15\" v)))"
          check/bin/emacs --batch --eval "(unless (native-comp-available-p) (error \"native-comp missing\"))"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: |
            emacs-${{ steps.ver.outputs.version }}-linux-x86_64.tar.gz
            emacs-${{ steps.ver.outputs.version }}-linux-x86_64.tar.gz.sha256
          generate_release_notes: true
